<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diplomas Lalo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f3f4f6;
overflow-x:hidden;
}

/* Splash Screen */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
opacity:1;
transition:opacity 3s ease;
}

#splash.fade-out{
opacity:0;
pointer-events:none;
}

#splash img{
width:320px;
max-width:85%;
object-fit:contain;
}

header{
background:#6d28d9;
color:white;
text-align:center;
padding:40px 20px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

header h1{
font-size:48px;
margin-bottom:10px;
}

header p{
font-size:18px;
opacity:0.9;
}

.container{
width:90%;
margin:auto;
padding:50px 0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:25px;
}

.card-content h2{
font-size:28px;
margin-bottom:10px;
color:#1f2937;
}

.price{
font-size:24px;
font-weight:bold;
color:#6d28d9;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#6d28d9;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5b21b6;
}

.form-section{
width:90%;
max-width:700px;
margin:20px auto 70px auto;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.form-section h2{
text-align:center;
font-size:40px;
margin-bottom:30px;
color:#1f2937;
}

input{
width:100%;
padding:16px;
margin-bottom:18px;
border:1px solid #d1d5db;
border-radius:15px;
font-size:16px;
}

.send-btn{
background:#16a34a;
}

.send-btn:hover{
background:#15803d;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
<img src="https://scontent.flim38-1.fna.fbcdn.net/v/t39.30808-6/305291497_458834266287777_8277300411850734890_n.jpg" alt="Diplomas Lalo">
</div>

<!-- Header -->
<header>
<h1>🎓 Diplomas Lalo</h1>
<p>Recuerdos de promoción personalizados</p>
</header>

<!-- Productos -->
<div class="container">
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1200&auto=format&fit=crop" alt="Cuadro">
<div class="card-content">
<h2>Cuadro Promocional</h2>
<p class="price">S/ 80</p>
<button onclick="seleccionarProducto('Cuadro Promocional')">Realizar Pedido</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop" alt="Taza">
<div class="card-content">
<h2>Taza Personalizada</h2>
<p class="price">S/ 35</p>
<button onclick="seleccionarProducto('Taza Personalizada')">Realizar Pedido</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1200&auto=format&fit=crop" alt="Diploma">
<div class="card-content">
<h2>Diploma Premium</h2>
<p class="price">S/ 50</p>
<button onclick="seleccionarProducto('Diploma Premium')">Realizar Pedido</button>
</div>
</div>

</div>
</div>

<!-- Formulario -->
<div class="form-section">
<h2>🧾 Formulario de Pedido</h2>

<input type="text" id="nombre" placeholder="Nombre completo">
<input type="text" id="dni" placeholder="DNI">
<input type="text" id="operacion" placeholder="Número de operación">
<input type="number" id="cantidad" placeholder="Cantidad">

<button class="send-btn" onclick="enviarPedido()">
Enviar Pedido 🚀
</button>
</div>

<!-- Footer -->
<footer>
<p>© 2026 Diplomas Lalo - Todos los derechos reservados</p>
</footer>

<script>

let productoSeleccionado = "";

function seleccionarProducto(producto){
productoSeleccionado = producto;
alert("Producto seleccionado: " + producto);
}

function enviarPedido(){

const nombre = document.getElementById("nombre").value;
const dni = document.getElementById("dni").value;
const operacion = document.getElementById("operacion").value;
const cantidad = document.getElementById("cantidad").value;

if(nombre === "" || dni === "" || operacion === "" || cantidad === "" || productoSeleccionado === ""){
alert("Completa todos los campos y selecciona un producto");
return;
}

alert("Pedido enviado correctamente 🎉");

}

window.onload = function(){

setTimeout(function(){

document.getElementById("splash").classList.add("fade-out");

setTimeout(function(){

document.getElementById("splash").style.display = "none";

},3000);

},2000);

};

</script>

</body>
</html>
