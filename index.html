    *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
    body{background:#fff;color:#111;}

    /* TOPBAR */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 24px;
      border-bottom:1px solid #eee;
      position:sticky;
      top:0;
      background:#fff;
      z-index:10;
    }

    .left-header{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .logo{
      width:80px;
      height:auto;
    }

    .brand-text{
      display:flex;
      flex-direction:column;
      line-height:1.2;
    }

    .brand-text h1{
      font-weight:800;
      font-size:20px;
    }

    .brand-text span{
      font-size:13px;
      color:#666;
    }

    /* MENU */
    .menu{
      font-weight:700;
      font-size:15px;
      cursor:pointer;
    }

    /* RIGHT HEADER */
    .right-header{
      display:flex;
      align-items:center;
      gap:12px;
    }
