<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diplomas Lalo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      overflow-x: hidden;
    }

    /* Splash Screen */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: fadeOut 3s ease forwards;
      animation-delay: 2s;
    }

    #splash-screen img {
      width: 180px;
      max-width: 60%;
      object-fit: contain;
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        visibility: hidden;
      }
    }

    header {
      background: #6d28d9;
      color: white;
      text-align: center;
      padding: 40px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    header h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
      opacity: 0.9;
    }

    .container {
      width: 90%;
      margin: auto;
      padding: 50px 0;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      background: white;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card-content {
      padding: 25px;
    }

    .card-content h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #1f2937;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
      color: #6d28d9;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 15px;
      background: #6d28d9;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5b21b6;
    }

    .form-section {
      width: 90%;
      max-width: 700px;
      margin: 20px auto 70px auto;
      background: white;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .form-section h2 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 30px;
      color: #1f2937;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 18px;
      border: 1px solid #d1d5db;
      border-radius: 15px;
      font-size: 16px;
    }

    .send-btn {
      background: #16a34a;
    }

    .send-btn:hover {
      background: #15803d;
    }

    footer {
      background: #111827;
      color: white;
      text-align: center;
      padding: 25px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <img
      src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKJLhJtFjdbHyPXrzd8DmUxYuB04algDi8cw&s"
      alt="Diplomas Lalo"
    >
  </div>

  <!-- Header -->
  <header>
    <h1>🎓 Diplomas Lalo</h1>
    <p>Recuerdos de promoción personalizados</p>
  </header>

  <!-- Productos -->
  <div class="container">
    <div class="products">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1200&auto=format&fit=crop" alt="Cuadro Promocional">

        <div class="card-content">
          <h2>Cuadro Promocional</h2>
          <p class="price">S/ 80</p>
          <button>Realizar Pedido</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop" alt="Taza Personalizada">

        <div class="card-content">
          <h2>Taza Personalizada</h2>
          <p class="price">S/ 35</p>
          <button>Realizar Pedido</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1200&auto=format&fit=crop" alt="Diploma Premium">

        <div class="card-content">
          <h2>Diploma Premium</h2>
          <p class="price">S/ 50</p>
          <button>Realizar Pedido</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Formulario -->
  <section class="form-section">
    <h2>🧾 Formulario de Pedido</h2>

    <input type="text" placeholder="Nombre completo">
    <input type="text" placeholder="DNI">
    <input type="text" placeholder="Número de operación">
    <input type="number" placeholder="Cantidad">

    <button class="send-btn">Enviar Pedido 🚀</button>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Diplomas Lalo - Todos los derechos reservados</p>
  </footer>

</body>
</html>
